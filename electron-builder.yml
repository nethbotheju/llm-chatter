appId: com.llmchatter.desktop
productName: llm Chatter
copyright: Copyright © 2026 ${author}
artifactName: ${productName}-${version}-${arch}.${ext}

directories:
  output: release
  buildResources: electron/build

files:
  - dist-electron/**/*
  - out/**/*
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,readme.md,*.map,*.ts,*.d.ts,*.spec.*}"
  - "!**/node_modules/.bin"
  - "!**/.{editorconfig,eslintrc*,prettierrc*,gitignore,travis.yml,nycrc}"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.idea,.vscode,.next,target}"

asar: true
asarUnpack:
  - "**/*.node"
  - "out/**"

# macOS
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: electron/build/entitlements.mac.plist
  entitlementsInherit: electron/build/entitlements.mac.plist
  notarize: false
  extendInfo:
    NSHumanReadableCopyright: Copyright © 2026 llm Chatter
  icon: electron/build/icon.icns

# Windows
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: electron/build/icon.ico
  publisherName: llm Chatter
  verifyUpdateCodeSignature: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: llm Chatter

# Linux
linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
    - target: rpm
      arch: [x64, arm64]
  category: Utility
  icon: electron/build/icon.png
  desktop:
    MimeType: x-scheme-handler/llmchatter
  maintainer: nethbotheju
  vendor: llm Chatter
  synopsis: Multi-provider LLM chat
  description: |
    llm Chatter is a multi-provider LLM chat application with conversation
    management, assistant customization, and encrypted API key storage.

# Auto-update (via GitHub Releases)
publish:
  provider: github
  owner: nethbotheju
  repo: llm-chatter
  releaseType: release
